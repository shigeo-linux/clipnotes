<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- App background -->
  <rect width="48" height="48" rx="8" fill="#2b2d30"/>
  <!-- Notepad body -->
  <rect x="8" y="10" width="26" height="32" rx="2" fill="#f0ebe0"/>
  <!-- Notepad top binding strip -->
  <rect x="8" y="10" width="26" height="5" rx="2" fill="#c8a96e"/>
  <!-- Binding holes -->
  <circle cx="16" cy="12.5" r="1.5" fill="#2b2d30"/>
  <circle cx="24" cy="12.5" r="1.5" fill="#2b2d30"/>
  <circle cx="32" cy="12.5" r="1.5" fill="#2b2d30"/>
  <!-- Text lines -->
  <line x1="13" y1="22" x2="29" y2="22" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="27" x2="29" y2="27" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="32" x2="22" y2="32" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Play button badge -->
  <circle cx="36" cy="36" r="9" fill="#c8a96e"/>
  <polygon points="33,32 33,40 41,36" fill="#2b2d30"/>
</svg>
